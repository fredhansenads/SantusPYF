<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Ativo</title>
</head>
<body>
    <h1>Cadastrar Novo Ativo</h1>

    <form method="POST">
        <label>Ticker:</label>
        <input type="text" name="ticker" required>
        <br><br>
        <label>Nome:</label>
        <input type="text" name="nome" required>
        <br><br>
        <label>Tipo:</label>
        <select name="tipo">
            <option value="Acao">Ação</option>
            <option value="FII">FII</option>
            <option value="Renda Fixa">Renda Fixa</option>
            <option value="ETF">ETF</option>
        </select>
        <br><br>
        <button type="submit">Salvar</button>
    </form>

    <a href="/">Voltar para a carteira</a>
</body>
</html>
