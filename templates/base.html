<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minha Carteira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">💼 Minha Carteira</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Carteira</a>
                <a class="nav-link" href="/transacoes">Transações</a>
                <a class="nav-link" href="/novo">Novo ativo</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with mensagens = get_flashed_messages(with_categories=true) %}
            {% for categoria, texto in mensagens %}
                <div class="alert alert-{{ categoria }}">{{ texto }}</div>
            {% endfor %}
        {% endwith %}
        {% block conteudo %}{% endblock %}
    </div>
</body>
</html>
