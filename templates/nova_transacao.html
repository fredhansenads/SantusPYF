<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Transação</title>
</head>
<body>
    <h1>Registrar Transação</h1>

    <form method="POST">
        <label>Ativo:</label>
        <select name="ativo_id">
            {% for ativo in ativos %}
            <option value="{{ ativo.id }}">{{ ativo.ticker }} - {{ ativo.nome }}</option>
            {% endfor %}
        </select>
        <br><br>
        <label>Data:</label>
        <input type="date" name="data" required>
        <br><br>
        <label>Tipo:</label>
        <select name="tipo">
            <option value="compra">Compra</option>
            <option value="venda">Venda</option>
        </select>
        <br><br>
        <label>Quantidade:</label>
        <input type="number" name="quantidade" step="any" min="0" required>
        <br><br>
        <label>Preço unitário (R$):</label>
        <input type="number" name="preco_unitario" step="any" min="0" required>
        <br><br>
        <button type="submit">Salvar</button>
    </form>

    <p><a href="/transacoes">Voltar para transações</a></p>
</body>
</html>
