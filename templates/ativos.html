<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Carteira</title>
</head>
<body>
    <h1>Minha Carteira de Investimentos</h1>

    <table border="1">
        <tr>
            <th>Ticker</th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Ações</th>
        </tr>
        {% for ativo in ativos %}
        <tr>
            <td>{{ ativo.ticker }}</td>
            <td>{{ ativo.nome }}</td>
            <td>{{ ativo.tipo }}</td>
            <td>                                            
                <a href="/editar/{{ ativo.id }}">Editar</a>
                <form method="POST" action="/excluir/{{ ativo.id }}"
                      style="display:inline"
                      onsubmit="return confirm('Excluir {{ ativo.ticker }}?')">
                    <button type="submit">Excluir</button>
                </form>
            </td>
            
        {% endfor %}
        </tr>
    </table>

    <p><a href="/novo">+ Cadastrar novo ativo</a></p>
    <p><a href="/transacoes">Ver transações</a></p>
</body>
</html>
