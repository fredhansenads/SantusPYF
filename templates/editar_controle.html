{% extends "base.html" %}

{% block conteudo %}
<h1 class="mb-1">Editar Lançamento</h1>
<p class="text-muted mb-4">{{ item.ativo.ticker }} — {{ item.quantidade }} un.</p>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Data com:</label>
        <input type="date" name="data_com" value="{{ item.data_com.isoformat() if item.data_com else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Data de pagamento:</label>
        <input type="date" name="data_pagamento" value="{{ item.data_pagamento.isoformat() if item.data_pagamento else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Valor (R$):</label>
        <input type="number" name="valor" value="{{ item.valor if item.valor is not none else '' }}" step="any" min="0" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Salvar alterações</button>
</form>
{% endblock %}
